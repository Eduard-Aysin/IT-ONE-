version: '3.7'
services:
  clickhouse:
    image: clickhouse/clickhouse-server
    container_name: clickhouse-server
    ports:
      - "8123:8123"
      - "9005:9000"
    volumes:
      - ~/clickhouse_data:/var/lib/clickhouse
      - ./custom-config.xml:/etc/clickhouse-server/config.xml
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: always
